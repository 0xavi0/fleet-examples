defaultNamespace: test-th-019
helm:
  repo: https://github.com/0xavi0/fleet-examples/raw/refs/heads/helm-chart-deps/charts
  chart: secret-chart
  version: 0.1.0
  values:
    secret:
      name: test-secret-019
    configmap-chart:
      configmap:
        name: test-cm-019
targetCustomizations:
  - name: test
    clusterSelector:
      matchExpressions:
        - key: fleet.cattle.io/state
          operator: In
          values:
            - running
            - scaledDown
      matchLabels:
        fleet.cattle.io/cluster: sim-cluster-5
    helm:
      values:
        secret:
          name: test-secret-019
        configmap-chart:
          configmap:
            name: test-cm-019
  - clusterSelector:
      matchLabels: {}
    doNotDeploy: true
