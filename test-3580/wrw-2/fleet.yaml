defaultNamespace: wrw-2

helm:
  chart: nginx
  repo: https://charts.bitnami.com/bitnami
  releaseName: wrw-2
  version: 19.1.1
  takeOwnership: true
  values:
    service:
      type: ClusterIP

targetCustomizations:
  - name: filter-cluster-2
    doNotDeploy: true
    clusterSelector:
      matchExpressions:
      - key: wrw-count
        operator: In
        values: ["one"]
