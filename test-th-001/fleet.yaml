defaultNamespace: test-th-001
helm:
  repo: https://github.com/0xavi0/fleet-examples/raw/refs/heads/helm-chart-deps/charts
  chart: secret-chart
  version: 0.1.0
  values:
    secret:
      name: test-secret-001
    configmap-chart:
      configmap:
        name: test-cm-001
targetCustomizations:
  - name: test
    clusterSelector:
      matchLabels:
        fleet.cattle.io/cluster: sim-cluster-3
    helm:
      values:
        secret:
          name: test-secret-001
        configmap-chart:
          configmap:
            name: test-cm-001
  - clusterSelector:
      matchLabels: {}
    doNotDeploy: true
