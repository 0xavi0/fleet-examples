defaultNamespace: test-th-008
helm:
  repo: https://github.com/0xavi0/fleet-examples/raw/refs/heads/helm-chart-deps/charts
  chart: secret-chart
  version: 0.1.0
  values:
    secret:
      name: test-secret-008
    configmap-chart:
      configmap:
        name: test-cm-008
targetCustomizations:
  - name: test
    clusterSelector:
      matchExpressions:
        - key: fleet.cattle.io/test/state
          operator: In
          values:
            - running
            - scaledDown
      matchLabels:
        fleet.cattle.io/cluster: sim-cluster-4
    helm:
      values:
        secret:
          name: test-secret-008
        configmap-chart:
          configmap:
            name: test-cm-008
  - clusterSelector:
      matchLabels: {}
    doNotDeploy: true
