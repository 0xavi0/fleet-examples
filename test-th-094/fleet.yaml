defaultNamespace: test-th-094
helm:
  repo: https://github.com/0xavi0/fleet-examples/raw/refs/heads/helm-chart-deps/charts
  chart: secret-chart
  version: 0.2.0
  values:
    secret:
      name: test-secret-094
    configmap-chart:
      configmap:
        name: test-cm-094
targetCustomizations:
  - name: test
    clusterSelector:
      matchExpressions:
        - key: fleet.cattle.io/state
          operator: In
          values:
            - running
            - scaledDown
      matchLabels:
        fleet.cattle.io/cluster: sim-cluster-9
    helm:
      valuesFiles:
        - values_helm.yaml
      values:
        secret:
          name: test-secret-094
        configmap-chart:
          configmap:
            name: test-cm-094
  - clusterSelector:
      matchExpressions:
        - key: fleet.cattle.io/cluster
          operator: NotIn
          values:
            - sim-cluster-9
    doNotDeploy: true
