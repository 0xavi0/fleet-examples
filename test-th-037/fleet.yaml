defaultNamespace: test-th-037
helm:
  repo: https://github.com/0xavi0/fleet-examples/raw/refs/heads/helm-chart-deps/charts
  chart: secret-chart
  version: 0.2.0
  values:
    secret:
      name: test-secret-037
    configmap-chart:
      configmap:
        name: test-cm-037
targetCustomizations:
  - name: test
    clusterSelector:
      matchExpressions:
        - key: fleet.cattle.io/state
          operator: In
          values:
            - running
            - scaledDown
        - key: fleet.cattle.io/cluster
          operator: In
          values:
            - sim-cluster-3
            - sim-cluster-6
    helm:
      valuesFiles:
        - values_helm.yaml
      values:
        secret:
          name: test-secret-037
        configmap-chart:
          configmap:
            name: test-cm-037
  - clusterSelector:
      matchExpressions:
        - key: fleet.cattle.io/cluster
          operator: NotIn
          values:
            - sim-cluster-3
            - sim-cluster-6
    doNotDeploy: true
